<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0914" />
      <stop offset="50%" stop-color="#140E28" />
      <stop offset="100%" stop-color="#05030A" />
    </linearGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF5E62" />
      <stop offset="50%" stop-color="#FF9966" />
      <stop offset="100%" stop-color="#FFD97D" />
    </linearGradient>

    <!-- Node Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" rx="12" fill="url(#bgGrad)" />

  <!-- Neural Net Accents (Background) -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1.5">
    <line x1="80" y1="50" x2="180" y2="100" />
    <line x1="180" y1="100" x2="280" y2="70" />
    <line x1="180" y1="100" x2="220" y2="180" />
    <line x1="280" y1="70" x2="350" y2="150" />
    <line x1="220" y1="180" x2="350" y2="150" />
    
    <line x1="600" y1="50" x2="700" y2="110" />
    <line x1="700" y1="110" x2="620" y2="190" />
    <line x1="700" y1="110" x2="750" y2="180" />
  </g>

  <!-- Glowing Nodes -->
  <g fill-opacity="0.15" filter="url(#glow)">
    <circle cx="180" cy="100" r="10" fill="#FF5E62" />
    <circle cx="280" cy="70" r="6" fill="#FF9966" />
    <circle cx="220" cy="180" r="8" fill="#FFD97D" />
    <circle cx="350" cy="150" r="12" fill="#FF5E62" />
    <circle cx="700" cy="110" r="9" fill="#FF9966" />
  </g>

  <!-- Title and Subtitle -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <!-- Main Title -->
    <text x="400" y="115" font-size="34" font-weight="800" fill="url(#textGrad)" letter-spacing="1">
      Awesome Supervised Fine-Tuning
    </text>
    <!-- Subtitle -->
    <text x="400" y="155" font-size="14" font-weight="400" fill="#A0A5C0" letter-spacing="2">
      EVOLUTION • VARIANTS • TYPES • APPLICATIONS
    </text>
  </g>

  <!-- Small Border Frame for premium feel -->
  <rect x="5" y="5" width="790" height="240" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
</svg>
